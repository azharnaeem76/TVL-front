<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843"/>
      <stop offset="50%" style="stop-color:#F0D06E"/>
      <stop offset="100%" style="stop-color:#B8912A"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D06E"/>
      <stop offset="100%" style="stop-color:#D4A843"/>
    </linearGradient>
  </defs>

  <!-- Outer ring of stylized figures with graduation caps -->
  <!-- Top figure -->
  <g transform="translate(250,60)">
    <circle cx="0" cy="-15" r="10" fill="url(#gold)"/>
    <path d="M-8,-28 L0,-35 L8,-28 L4,-28 L4,-25 L-4,-25 L-4,-28 Z" fill="url(#gold)"/>
    <path d="M-25,20 L-8,-5 L0,5 L8,-5 L25,20" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Top-right figure -->
  <g transform="translate(390,130) rotate(60)">
    <circle cx="0" cy="-15" r="10" fill="url(#gold)"/>
    <path d="M-8,-28 L0,-35 L8,-28 L4,-28 L4,-25 L-4,-25 L-4,-28 Z" fill="url(#gold)"/>
    <path d="M-25,20 L-8,-5 L0,5 L8,-5 L25,20" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Right figure -->
  <g transform="translate(430,270) rotate(120)">
    <circle cx="0" cy="-15" r="10" fill="url(#gold)"/>
    <path d="M-8,-28 L0,-35 L8,-28 L4,-28 L4,-25 L-4,-25 L-4,-28 Z" fill="url(#gold)"/>
    <path d="M-25,20 L-8,-5 L0,5 L8,-5 L25,20" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Bottom-right figure -->
  <g transform="translate(370,400) rotate(180)">
    <circle cx="0" cy="-15" r="10" fill="url(#gold)"/>
    <path d="M-8,-28 L0,-35 L8,-28 L4,-28 L4,-25 L-4,-25 L-4,-28 Z" fill="url(#gold)"/>
    <path d="M-25,20 L-8,-5 L0,5 L8,-5 L25,20" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Bottom-left figure -->
  <g transform="translate(130,400) rotate(240)">
    <circle cx="0" cy="-15" r="10" fill="url(#gold)"/>
    <path d="M-8,-28 L0,-35 L8,-28 L4,-28 L4,-25 L-4,-25 L-4,-28 Z" fill="url(#gold)"/>
    <path d="M-25,20 L-8,-5 L0,5 L8,-5 L25,20" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Left figure -->
  <g transform="translate(70,270) rotate(300)">
    <circle cx="0" cy="-15" r="10" fill="url(#gold)"/>
    <path d="M-8,-28 L0,-35 L8,-28 L4,-28 L4,-25 L-4,-25 L-4,-28 Z" fill="url(#gold)"/>
    <path d="M-25,20 L-8,-5 L0,5 L8,-5 L25,20" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Top-left figure -->
  <g transform="translate(110,130) rotate(360)">
    <circle cx="0" cy="-15" r="10" fill="url(#gold)"/>
    <path d="M-8,-28 L0,-35 L8,-28 L4,-28 L4,-25 L-4,-25 L-4,-28 Z" fill="url(#gold)"/>
    <path d="M-25,20 L-8,-5 L0,5 L8,-5 L25,20" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Center: Pen/pillar with scales of justice -->
  <g transform="translate(250,250)">
    <!-- Graduation cap on top -->
    <path d="M-18,-110 L0,-120 L18,-110 L10,-110 L10,-105 L-10,-105 L-10,-110 Z" fill="url(#gold)"/>

    <!-- Pen/pillar body -->
    <rect x="-8" y="-100" width="16" height="120" rx="3" fill="url(#gold)"/>
    <!-- Pen nib at bottom -->
    <path d="M-8,20 L0,45 L8,20 Z" fill="url(#gold)"/>

    <!-- Crossbar for scales -->
    <line x1="-70" y1="-50" x2="70" y2="-50" stroke="url(#goldLight)" stroke-width="4" stroke-linecap="round"/>

    <!-- Left scale chain -->
    <line x1="-70" y1="-50" x2="-70" y2="-20" stroke="url(#goldLight)" stroke-width="2.5"/>
    <!-- Left scale pan -->
    <path d="M-95,-20 Q-70,-10 -45,-20" stroke="url(#goldLight)" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Right scale chain -->
    <line x1="70" y1="-50" x2="70" y2="-20" stroke="url(#goldLight)" stroke-width="2.5"/>
    <!-- Right scale pan -->
    <path d="M45,-20 Q70,-10 95,-20" stroke="url(#goldLight)" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Small decorative circles at scale tops -->
    <circle cx="-70" cy="-50" r="4" fill="url(#goldLight)"/>
    <circle cx="70" cy="-50" r="4" fill="url(#goldLight)"/>
  </g>

  <!-- Text banner -->
  <rect x="140" y="330" width="220" height="40" rx="4" fill="url(#gold)"/>
  <text x="250" y="357" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#0a0e1a" letter-spacing="1">The Value Of Law</text>
</svg>
